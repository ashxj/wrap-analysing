<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-klase Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  <script>(function(){var t=localStorage.getItem('eklase-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:16px">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="lv" onclick="setLang('lv')">LV</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <button id="theme-toggle" class="btn btn-secondary btn-sm theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="theme-icon-sun"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
        <span class="theme-icon-moon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      </button>
    </div>

    <div class="login-logo">
      <h1>e-klase</h1>
      <p data-i18n="login.subtitle">Atzīmju analītika</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" style="margin-bottom:16px">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="username" data-i18n="login.username">e-klase Lietotājvārds</label>
        <input type="text" id="username" name="username" placeholder="example@inbox.lv" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password" data-i18n="login.password">Parole</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="profile_id">
          <span data-i18n="login.profile_id">Profila ID</span>
          <span style="color:var(--text-muted);font-size:0.7rem" data-i18n="login.optional">(neobligāti)</span>
        </label>
        <input type="text" id="profile_id" name="profile_id"
               data-i18n-ph="login.placeholder"
               placeholder="Atstājiet tukšu automātiskajai izvēlei">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        <span data-i18n="login.submit">Pieteikties ar e-klase.lv</span>
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.75rem;color:var(--text-muted)"
       data-i18n="login.note">
      Autorizācija caur Keycloak OIDC. Parole netiek glabāta atklātā veidā.
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>applyLang(currentLang);</script>
</body>
</html>
